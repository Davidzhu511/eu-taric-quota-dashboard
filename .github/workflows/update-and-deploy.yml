name: Update TARIC dashboard and deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"
      timezone: "Europe/Berlin"
  push:
    branches: [main]
    paths:
      - "index.html"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-and-deploy.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch current EU TARIC quota data
        run: python scripts/update_dashboard.py

      - name: Save current data and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current.json data/history
          if ! git diff --cached --quiet; then
            git commit -m "data: update TARIC quota snapshot"
            git push
          fi

      - name: Prepare static site
        run: |
          mkdir -p _site/data
          cp index.html _site/index.html
          cp -R data/. _site/data/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

