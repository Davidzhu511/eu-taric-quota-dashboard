name: Update EU and UK quota dashboards and deploy Pages

on:
  workflow_dispatch:
  schedule:
    # UTC fallback slots. The gate below converts actual start time to Europe/Berlin.
    # Primary target: 07:50 Berlin; later slots recover delayed/dropped events.
    - cron: "45,50 5,6,7 * * *"
  push:
    branches: [main]
    paths:
      - "index.html"
      - "uk.html"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-and-deploy.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: quota-dashboard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  schedule-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      wait_seconds: ${{ steps.check.outputs.wait_seconds }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check out latest main for daily deduplication
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Select the daily 07:50 Europe/Berlin refresh
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          should_run=true
          wait_seconds=0
          reason="manual or source-code update"

          if [[ "$EVENT_NAME" == "schedule" ]]; then
            berlin_today="$(TZ=Europe/Berlin date +%F)"
            berlin_hhmm="$(TZ=Europe/Berlin date +%H%M)"

            current_meta="$(python - <<'PY'
          import json
          from pathlib import Path

          def status(path):
              try:
                  meta = json.loads(Path(path).read_text(encoding="utf-8")).get("meta", {})
              except (OSError, json.JSONDecodeError, TypeError):
                  meta = {}
              return (
                  str(meta.get("checked_at", ""))[:10],
                  int(meta.get("successful_count", 0) or 0),
                  int(meta.get("failed_count", 0) or 0),
                  int(meta.get("total_count", 0) or 0),
              )

          eu = status("data/current.json")
          uk = status("data/uk/current.json")
          print("|".join(map(str, (*eu, *uk))))
          PY
            )"
            IFS="|" read -r eu_date eu_success eu_failed eu_total uk_date uk_success uk_failed uk_total <<< "$current_meta"

            complete=false
            if [[ "$eu_date" == "$berlin_today" && "$uk_date" == "$berlin_today" && "$eu_total" -gt 0 && "$uk_total" -gt 0 && "$eu_success" -eq "$eu_total" && "$uk_success" -eq "$uk_total" && "$eu_failed" -eq 0 && "$uk_failed" -eq 0 ]]; then
              complete=true
            fi

            if (( 10#$berlin_hhmm < 745 )); then
              should_run=false
              reason="pre-DST fallback slot: local time is before 07:45"
            elif [[ "$complete" == "true" ]]; then
              should_run=false
              reason="today already has complete EU and UK refreshes"
            else
              reason="today has no complete EU+UK refresh; run or retry"
              now_epoch="$(date +%s)"
              target_epoch="$(TZ=Europe/Berlin date -d "$berlin_today 07:50:00" +%s)"
              if (( now_epoch < target_epoch )); then
                wait_seconds="$((target_epoch - now_epoch))"
                reason="$reason after waiting for 07:50 Berlin"
              fi
            fi
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "wait_seconds=$wait_seconds" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          {
            echo "### EU + UK quota schedule gate"
            printf -- '- should_run: `%s`\n' "$should_run"
            printf -- '- wait_seconds: `%s`\n' "$wait_seconds"
            echo "- reason: $reason"
          } >> "$GITHUB_STEP_SUMMARY"

  update-and-build:
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Wait for the 07:50 Berlin target
        if: needs.schedule-gate.outputs.wait_seconds != '0'
        env:
          WAIT_SECONDS: ${{ needs.schedule-gate.outputs.wait_seconds }}
        run: sleep "$WAIT_SECONDS"

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch current EU TARIC quota data
        run: python scripts/update_dashboard.py

      - name: Fetch current UK Category 4 quota data
        run: python scripts/update_uk_dashboard.py

      - name: Validate generated dashboard data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          eu = json.loads(Path("data/current.json").read_text(encoding="utf-8"))
          eu_meta, eu_items = eu.get("meta", {}), eu.get("items", [])
          assert len(eu_items) == 55, f"expected 55 EU items, got {len(eu_items)}"
          assert eu_meta.get("total_count") == 55
          assert eu_meta.get("successful_count", 0) + eu_meta.get("failed_count", 0) == 55
          assert len({item.get("code") for item in eu_items}) == 55

          uk = json.loads(Path("data/uk/current.json").read_text(encoding="utf-8"))
          uk_meta, uk_items = uk.get("meta", {}), uk.get("items", [])
          expected = ["058604", "058605", "058606", "058607", "058608"]
          assert [item.get("code") for item in uk_items] == expected
          assert uk_meta.get("jurisdiction") == "UK"
          assert uk_meta.get("total_count") == 5
          assert uk_meta.get("successful_count", 0) + uk_meta.get("failed_count", 0) == 5
          assert next(item for item in uk_items if item.get("code") == "058608").get("china_uses_this_pool") is True
          print(f"validated EU {len(eu_items)} and UK {len(uk_items)} quota records")
          PY

      - name: Save current data and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current.json data/history data/uk
          if ! git diff --cached --quiet; then
            git commit -m "data: update EU and UK quota snapshots"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                break
              fi
              if [[ "$attempt" -eq 3 ]]; then
                exit 1
              fi
            done
          fi

      - name: Prepare static site
        run: |
          mkdir -p _site/data
          cp index.html _site/index.html
          cp uk.html _site/uk.html
          python scripts/inject_uk_nav.py _site/index.html
          cp -R data/. _site/data/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: update-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
