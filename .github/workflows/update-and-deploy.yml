name: Update TARIC dashboard and deploy Pages
# Native Europe/Berlin schedule with an early queue slot and daily deduplication.

on:
  workflow_dispatch:
  schedule:
    # The 07:35 event queues early and waits for 07:50 when it starts on time.
    # The 07:50 event is a fallback; the gate prevents a second daily refresh.
    - cron: "35 7 * * *"
      timezone: "Europe/Berlin"
    - cron: "50 7 * * *"
      timezone: "Europe/Berlin"
  push:
    branches: [main]
    paths:
      - "index.html"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-and-deploy.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  schedule-gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      wait_seconds: ${{ steps.check.outputs.wait_seconds }}
    steps:
      - name: Check out repository for daily deduplication
        uses: actions/checkout@v6

      - name: Select one daily 07:50 Europe/Berlin refresh
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          should_run=true
          wait_seconds=0

          if [[ "$EVENT_NAME" == "schedule" ]]; then
            berlin_today="$(TZ=Europe/Berlin date +%F)"
            last_checked="$(python -c 'import json; print(json.load(open("data/current.json", encoding="utf-8")).get("meta", {}).get("checked_at", "")[:10])' 2>/dev/null || true)"

            if [[ "$last_checked" == "$berlin_today" ]]; then
              should_run=false
            else
              now_epoch="$(date +%s)"
              target_epoch="$(TZ=Europe/Berlin date -d "$berlin_today 07:50:00" +%s)"
              if (( now_epoch < target_epoch )); then
                wait_seconds="$((target_epoch - now_epoch))"
              fi
            fi
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "wait_seconds=$wait_seconds" >> "$GITHUB_OUTPUT"

  update-and-build:
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the 07:50 Berlin target
        if: needs.schedule-gate.outputs.wait_seconds != '0'
        env:
          WAIT_SECONDS: ${{ needs.schedule-gate.outputs.wait_seconds }}
        run: sleep "$WAIT_SECONDS"

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch current EU TARIC quota data
        run: python scripts/update_dashboard.py

      - name: Save current data and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current.json data/history
          if ! git diff --cached --quiet; then
            git commit -m "data: update TARIC quota snapshot"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                break
              fi
              if [[ "$attempt" -eq 3 ]]; then
                exit 1
              fi
            done
          fi

      - name: Prepare static site
        run: |
          mkdir -p _site/data
          cp index.html _site/index.html
          cp -R data/. _site/data/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
