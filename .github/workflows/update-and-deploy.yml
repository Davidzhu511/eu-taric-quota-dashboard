name: Update TARIC dashboard and deploy Pages
# Manual refresh trigger: 2026-07-15 08:02 Europe/Berlin

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules are evaluated in UTC. Run both DST candidates, then
    # let schedule-gate select the one that equals 07:50 in Europe/Berlin.
    - cron: "50 5 * * *"
    - cron: "50 6 * * *"
  push:
    branches: [main]
    paths:
      - "index.html"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-and-deploy.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  schedule-gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Select the 07:50 Europe/Berlin schedule
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          should_run=true
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            berlin_offset="$(TZ=Europe/Berlin date +%z)"
            case "$EVENT_SCHEDULE:$berlin_offset" in
              "50 5 * * *:+0200"|"50 6 * * *:+0100") should_run=true ;;
              *) should_run=false ;;
            esac
          fi
          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

  update-and-build:
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch current EU TARIC quota data
        run: python scripts/update_dashboard.py

      - name: Save current data and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current.json data/history
          if ! git diff --cached --quiet; then
            git commit -m "data: update TARIC quota snapshot"
            git push
          fi

      - name: Prepare static site
        run: |
          mkdir -p _site/data
          cp index.html _site/index.html
          cp -R data/. _site/data/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
