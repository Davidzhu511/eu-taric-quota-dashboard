name: Update TARIC dashboard and deploy Pages

on:
  workflow_dispatch:
  schedule:
    # UTC fallback slots. The gate below converts the actual start time to
    # Europe/Berlin, so the same workflow works in both CET and CEST.
    # Primary target: 07:50 Berlin; later slots recover delayed/dropped events.
    - cron: "45,50 5,6,7 * * *"
  push:
    branches: [main]
    paths:
      - "index.html"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update-and-deploy.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: taric-dashboard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  schedule-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      wait_seconds: ${{ steps.check.outputs.wait_seconds }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check out latest main for daily deduplication
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Select the daily 07:50 Europe/Berlin refresh
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          should_run=true
          wait_seconds=0
          reason="manual or source-code update"

          if [[ "$EVENT_NAME" == "schedule" ]]; then
            berlin_today="$(TZ=Europe/Berlin date +%F)"
            berlin_hhmm="$(TZ=Europe/Berlin date +%H%M)"

            current_meta="$(python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/current.json")
          try:
              meta = json.loads(path.read_text(encoding="utf-8")).get("meta", {})
          except (OSError, json.JSONDecodeError, TypeError):
              meta = {}
          checked_date = str(meta.get("checked_at", ""))[:10]
          successful = int(meta.get("successful_count", 0) or 0)
          failed = int(meta.get("failed_count", 0) or 0)
          total = int(meta.get("total_count", 0) or 0)
          print(f"{checked_date}|{successful}|{failed}|{total}")
          PY
            )"
            IFS="|" read -r checked_date successful failed total <<< "$current_meta"

            if (( 10#$berlin_hhmm < 745 )); then
              should_run=false
              reason="pre-DST fallback slot: local time is before 07:45"
            elif [[ "$checked_date" == "$berlin_today" && "$successful" -eq "$total" && "$total" -gt 0 && "$failed" -eq 0 ]]; then
              should_run=false
              reason="today already has a complete $successful/$total refresh"
            else
              reason="today has no complete refresh; run or retry"
              now_epoch="$(date +%s)"
              target_epoch="$(TZ=Europe/Berlin date -d "$berlin_today 07:50:00" +%s)"
              if (( now_epoch < target_epoch )); then
                wait_seconds="$((target_epoch - now_epoch))"
                reason="$reason after waiting for 07:50 Berlin"
              fi
            fi
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "wait_seconds=$wait_seconds" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          {
            echo "### TARIC schedule gate"
            printf -- '- should_run: `%s`\n' "$should_run"
            printf -- '- wait_seconds: `%s`\n' "$wait_seconds"
            echo "- reason: $reason"
          } >> "$GITHUB_STEP_SUMMARY"

  update-and-build:
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Wait for the 07:50 Berlin target
        if: needs.schedule-gate.outputs.wait_seconds != '0'
        env:
          WAIT_SECONDS: ${{ needs.schedule-gate.outputs.wait_seconds }}
        run: sleep "$WAIT_SECONDS"

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch current EU TARIC quota data
        run: python scripts/update_dashboard.py

      - name: Validate generated dashboard data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("data/current.json").read_text(encoding="utf-8"))
          meta = payload.get("meta", {})
          items = payload.get("items", [])
          assert len(items) == 55, f"expected 55 items, got {len(items)}"
          assert meta.get("total_count") == 55
          assert meta.get("successful_count", 0) + meta.get("failed_count", 0) == 55
          assert len({item.get("code") for item in items}) == 55
          print(
              f"validated {len(items)} items; "
              f"fresh={meta.get('successful_count')}; failed={meta.get('failed_count')}; "
              f"official_date={meta.get('official_update_date') or 'unavailable'}"
          )
          PY

      - name: Save current data and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current.json data/history
          if ! git diff --cached --quiet; then
            git commit -m "data: update TARIC quota snapshot"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                break
              fi
              if [[ "$attempt" -eq 3 ]]; then
                exit 1
              fi
            done
          fi

      - name: Prepare static site
        run: |
          mkdir -p _site/data
          cp index.html _site/index.html
          cp -R data/. _site/data/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: update-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
