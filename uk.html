<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="英国钢铁Category 4关税配额每日更新看板">
  <title>英国钢铁Category 4配额看板</title>
  <style>
    :root{color-scheme:dark;--bg:#0b0c0b;--surface:#252622;--deep:#151613;--text:#f3ecd9;--muted:#aaa99f;--border:rgba(211,177,95,.25);--gold:#d3b15f;--danger:#e06b62;--warning:#d89a3d;--grey:#6f716b;--shadow:0 18px 48px rgba(0,0,0,.42)}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 8% 0,rgba(211,177,95,.13),transparent 30%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.page{width:min(1380px,100%);margin:auto;padding:clamp(14px,2.5vw,34px)}
    a{color:var(--gold)}.hero,.toolbar,.stat,.card,.notice,.error{border:1px solid var(--border);background:linear-gradient(145deg,rgba(42,43,39,.95),rgba(24,25,22,.96));box-shadow:var(--shadow)}.hero{padding:26px;border-radius:24px}.hero-top,.head,.metric,.foot{display:flex;justify-content:space-between;gap:14px;align-items:center}.hero-top{align-items:flex-start}.title{margin:0;background:linear-gradient(92deg,#f5e5b3,#d3b15f,#b88b34);background-clip:text;color:transparent;font-size:clamp(25px,3vw,38px)}.subtitle{color:var(--muted)}.nav{display:flex;gap:8px;flex-wrap:wrap}.pill,.button,.control{border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--text);padding:9px 13px;text-decoration:none}.pill.active{background:linear-gradient(135deg,#e1c578,#b88b34);color:#111}.meta,.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px;margin-top:20px}.meta span,.label{display:block;color:var(--muted);font-size:13px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px;padding:14px;border-radius:18px}.toolbar .spacer{flex:1}.button{cursor:pointer}.summary .stat{padding:17px;border-radius:18px}.value{display:block;margin-top:8px;font-size:25px}.notice,.error{margin-top:18px;padding:14px 16px;border-radius:16px}.notice{color:var(--gold)}.error{display:none;color:var(--danger)}.error.show{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px;margin-top:20px}.card{position:relative;padding:17px;border-radius:20px}.card.china{border:2px solid var(--gold);background:linear-gradient(145deg,rgba(42,43,39,.96),rgba(211,177,95,.12))}.card.china:before{content:"中国使用的共用池";position:absolute;top:0;left:0;padding:5px 11px;border-radius:0 0 11px 0;background:var(--gold);color:#111;font-size:11px;font-weight:800}.card.china .head{padding-top:18px}.badge{display:inline-flex;padding:4px 9px;border-radius:999px;background:rgba(211,177,95,.13);color:var(--gold);font-size:12px;font-weight:700}.code{font-family:ui-monospace,monospace}.origin{min-height:60px;margin-top:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}.balance{margin:12px 0;padding:13px;border-radius:14px;background:linear-gradient(135deg,rgba(211,177,95,.16),rgba(111,113,107,.13));font-size:23px;font-weight:700}.metric{margin-top:9px}.metric span{color:var(--muted)}.progress{height:8px;margin-top:14px;border-radius:99px;background:rgba(127,127,127,.18);overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--grey),#b88b34,#e7cc82)}.foot{margin-top:8px;color:var(--muted);font-size:12px}.empty{grid-column:1/-1;padding:45px;text-align:center;color:var(--muted)}footer{padding:28px 4px;text-align:center;color:var(--muted);font-size:12px}
    @media(max-width:850px){.meta,.summary{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:600px){.hero-top{display:block}.nav{margin-top:16px}.meta,.summary{grid-template-columns:1fr}.toolbar .control,.toolbar .button{width:100%}}
  </style>
</head>
<body><main class="page">
  <section class="hero"><div class="hero-top"><div><h1 class="title">英国钢铁Category 4配额看板</h1><p class="subtitle">Metallic coated sheets · 英国与欧盟数据完全分开</p></div><nav class="nav"><a class="pill" href="./">欧盟看板</a><a class="pill active" href="./uk.html">英国看板</a><a class="pill" id="law-link" target="_blank" rel="noopener">英国立法文件 ↗</a></nav></div>
  <div class="meta"><div><span>官方数据日期</span><strong id="official-date">—</strong></div><div><span>数据版本</span><strong id="version">—</strong></div><div><span>当前有效期</span><strong id="period">—</strong></div><div><span>最后检查</span><strong id="checked">—</strong></div></div></section>
  <section class="toolbar"><input class="control" id="search" type="search" placeholder="搜索配额号或原产地"><select class="control" id="sort"><option value="code">按配额号</option><option value="remaining">剩余比例从低到高</option><option value="used">使用率从高到低</option></select><span class="spacer"></span><button class="button" id="csv">CSV导出</button><button class="button" id="json">JSON导出</button></section>
  <section class="summary"><article class="stat"><span class="label">Category 4配额池</span><strong class="value" id="count">—</strong></article><article class="stat"><span class="label">058608剩余</span><strong class="value" id="china-balance">—</strong></article><article class="stat"><span class="label">058608使用率</span><strong class="value" id="china-used">—</strong></article><article class="stat"><span class="label">配额外税率</span><strong class="value">50%</strong></article></section>
  <section class="notice" id="notice">正在读取英国官方数据……</section><section class="error" id="errors"></section><section class="grid" id="cards"></section>
  <footer>原产地名称严格依据英国《UK's steel trade measure from 1 July 2026》Table 4。英国公开余额可能滞后HMRC实际分配数日，不能视为配额锁定。</footer>
</main>
<script>
const state={data:null,search:"",sort:"code"};const nf=new Intl.NumberFormat("en-US",{maximumFractionDigits:0});const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
const fmtTime=v=>{if(!v)return"—";const d=new Date(v);return Number.isNaN(d.getTime())?v:new Intl.DateTimeFormat("zh-CN",{dateStyle:"medium",timeStyle:"short",timeZone:"Europe/Berlin"}).format(d)};
function rows(){let r=[...(state.data?.items||[])];const q=state.search.trim().toLowerCase();if(q)r=r.filter(x=>`${x.code} ${x.origin} ${x.origin_zh} ${x.official_geographical_areas}`.toLowerCase().includes(q));r.sort((a,b)=>state.sort==="remaining"?Number(a.remaining_percentage||0)-Number(b.remaining_percentage||0):state.sort==="used"?Number(b.used_percentage||0)-Number(a.used_percentage||0):a.code.localeCompare(b.code));return r}
function render(){const m=state.data?.meta||{};const r=rows();document.querySelector("#official-date").textContent=m.official_update_date||"—";document.querySelector("#version").textContent=m.dataset_version?`v${m.dataset_version}`:"—";document.querySelector("#period").textContent=m.validity_period||"—";document.querySelector("#checked").textContent=fmtTime(m.checked_at);document.querySelector("#law-link").href=m.legislation_url||"#";document.querySelector("#count").textContent=`${r.length}个`;const china=(state.data?.items||[]).find(x=>x.code==="058608");document.querySelector("#china-balance").textContent=china?`${nf.format(Number(china.balance||0))} ${china.measurement_unit||""}`:"—";document.querySelector("#china-used").textContent=china?`${Number(china.used_percentage||0).toFixed(1)}%`:"—";document.querySelector("#notice").textContent=`058608为Residual共用池，中国与其他未获单独Category 4国别配额的来源共同使用。${m.warning||""}`;
const f=state.data?.failures||[];const e=document.querySelector("#errors");e.classList.toggle("show",f.length>0);e.textContent=f.length?`本次有${f.length}个编号未更新：${f.map(x=>`${x.code}（${x.error}）`).join("；")}`:"";const cards=document.querySelector("#cards");if(!r.length){cards.innerHTML='<div class="empty">没有符合条件的数据。</div>';return}cards.innerHTML=r.map(x=>{const initial=Number(x.initial_amount||0),balance=Number(x.balance||0),used=Number(x.used_amount||Math.max(initial-balance,0)),remain=Number(x.remaining_percentage||0),usedPct=Number(x.used_percentage||0);return `<article class="card ${x.china_uses_this_pool?"china":""}"><div class="head"><span class="badge">英国 · Category ${esc(x.category)}</span><span class="code">${esc(x.code)}</span></div><div class="origin"><strong>立法原产地：</strong>${esc(x.origin_zh||x.origin)}<br><span class="label">官方数据地域：${esc(x.official_geographical_areas||"—")}</span></div><div class="balance">${nf.format(balance)} ${esc(x.measurement_unit||"")}</div><div class="metric"><span>初始配额</span><strong>${nf.format(initial)} ${esc(x.measurement_unit||"")}</strong></div><div class="metric"><span>已使用</span><strong>${nf.format(used)} ${esc(x.measurement_unit||"")}</strong></div><div class="metric"><span>使用率</span><strong>${usedPct.toFixed(1)}%</strong></div><div class="metric"><span>状态</span><strong>${esc(x.status||"—")}</strong></div><div class="metric"><span>最近分配</span><strong>${esc(x.last_allocation_date||"—")}</strong></div><div class="progress"><span style="width:${Math.max(0,Math.min(100,remain))}%"></span></div><div class="foot"><span>${remain.toFixed(1)}%剩余</span><span>${esc(x.validity_period||"")}</span></div></article>`}).join("")}
async function load(){try{const res=await fetch(`./data/uk/current.json?v=${Date.now()}`,{cache:"no-store"});if(!res.ok)throw new Error(`HTTP ${res.status}`);state.data=await res.json();render()}catch(err){const e=document.querySelector("#errors");e.classList.add("show");e.textContent=`数据加载失败：${err.message}`}}
function download(name,content,type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
document.querySelector("#search").addEventListener("input",e=>{state.search=e.target.value;render()});document.querySelector("#sort").addEventListener("change",e=>{state.sort=e.target.value;render()});document.querySelector("#json").addEventListener("click",()=>download("uk-category4-quota.json",JSON.stringify(state.data,null,2),"application/json"));document.querySelector("#csv").addEventListener("click",()=>{const h=["jurisdiction","category","order_number","origin","origin_zh","initial","balance","used","used_pct","remaining_pct","status","last_allocation_date","validity_period","china_uses_this_pool","source_url"];const body=rows().map(x=>["UK",x.category,x.code,x.origin,x.origin_zh,x.initial_amount,x.balance,x.used_amount,x.used_percentage,x.remaining_percentage,x.status,x.last_allocation_date,x.validity_period,x.china_uses_this_pool,x.source_url]);const csv=[h,...body].map(row=>row.map(v=>`"${String(v??"").replaceAll('"','""')}"`).join(",")).join("\n");download("uk-category4-quota.csv",`\ufeff${csv}`,"text/csv;charset=utf-8")});load();
</script></body></html>
